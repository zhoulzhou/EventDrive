{% extends "base.html" %}

{% block title %}新闻详情 - 新闻抓取应用{% endblock %}

{% block content %}
<div class="back-btn-container">
    <button onclick="history.back()" class="back-btn">&larr; 返回</button>
</div>

<div id="newsDetail" class="news-detail">
    <div class="loading">加载中...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const newsId = {{ news_id }};

async function loadNewsDetail() {
    try {
        const response = await fetch(`/api/news/${newsId}`);
        if (!response.ok) {
            throw new Error('新闻不存在');
        }
        const news = await response.json();
        renderNewsDetail(news);
    } catch (error) {
        document.getElementById('newsDetail').innerHTML = `
            <div class="error-state">
                <h2>加载失败</h2>
                <p>${error.message}</p>
            </div>
        `;
    }
}

function renderNewsDetail(news) {
    const container = document.getElementById('newsDetail');
    container.innerHTML = `
        <div class="detail-header">
            <h1 class="detail-title">${escapeHtml(news.title)}</h1>
            <div class="detail-meta">
                <span class="detail-source">${news.source}</span>
                <span class="detail-time">发布时间: ${formatTime(news.publish_time)}</span>
                <span class="detail-author">作者: ${escapeHtml(news.author || '未知')}</span>
            </div>
        </div>
        
        ${news.image_path ? `
            <div class="detail-image">
                <img src="${news.image_path}" alt="${escapeHtml(news.title)}">
            </div>
        ` : ''}
        
        <div class="detail-content">
            ${news.content ? escapeHtml(news.content).replace(/\n/g, '<br>') : '<p>暂无内容</p>'}
        </div>
        
        <div class="detail-footer">
            <span class="crawl-time">抓取时间: ${formatTime(news.created_at)}</span>
        </div>
    `;
}

function formatTime(timeStr) {
    const date = new Date(timeStr);
    return date.toLocaleString('zh-CN');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

loadNewsDetail();
</script>
{% endblock %}
