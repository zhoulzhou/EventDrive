{% extends "base.html" %}

{% block title %}抓取控制 - 新闻抓取应用{% endblock %}

{% block content %}
<div class="page-header">
    <h1>抓取控制</h1>
</div>

<div class="control-panel">
    <div class="control-card">
        <h2>手动抓取</h2>
        <p>立即开始抓取所有来源的最新新闻</p>
        <button id="startCrawlBtn" class="btn btn-primary">开始抓取</button>
    </div>
    
    <div class="status-card">
        <h2>抓取状态</h2>
        <div id="statusInfo">
            <div class="status-item">
                <span class="status-label">当前状态:</span>
                <span id="crawlStatus" class="status-value">空闲</span>
            </div>
            <div class="status-item">
                <span class="status-label">当前步骤:</span>
                <span id="currentStep" class="status-value">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">最后抓取时间:</span>
                <span id="lastCrawlTime" class="status-value">-</span>
            </div>
        </div>
    </div>
</div>

<div class="crawl-logs-section">
    <h2>抓取日志</h2>
    <div id="crawlLogs" class="crawl-logs">
        <div class="log-placeholder">点击"开始抓取"按钮启动抓取任务</div>
    </div>
</div>

<div class="sources-status">
    <h2>各来源抓取状态</h2>
    <div id="sourcesList" class="sources-grid">
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.crawl-logs-section {
    margin-top: 20px;
    background: #1e1e1e;
    border-radius: 8px;
    padding: 15px;
    color: #d4d4d4;
}

.crawl-logs-section h2 {
    color: #fff;
    margin-bottom: 15px;
    font-size: 16px;
}

.crawl-logs {
    max-height: 400px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.6;
    background: #252526;
    padding: 10px;
    border-radius: 4px;
}

.log-placeholder {
    color: #666;
    text-align: center;
    padding: 20px;
}

.log-item {
    padding: 2px 0;
    border-bottom: 1px solid #333;
}

.log-item:last-child {
    border-bottom: none;
}

.log-time {
    color: #858585;
    margin-right: 10px;
}

.log-success { color: #4ec9b0; }
.log-info { color: #9cdcfe; }
.log-warning { color: #dcdcaa; }
.log-error { color: #f14c4c; }
.log-running { color: #c586c0; }
</style>
<script>
let isCrawling = false;

async function loadStatus() {
    try {
        const response = await fetch('/api/crawl/status');
        const data = await response.json();
        updateStatus(data);
        updateLogs(data.logs || []);
    } catch (error) {
        console.error('加载状态失败:', error);
    }
}

function getLogClass(message) {
    if (message.includes('❌') || message.includes('错误')) return 'log-error';
    if (message.includes('✅') || message.includes('完成')) return 'log-success';
    if (message.includes('🚀') || message.includes('开始')) return 'log-running';
    if (message.includes('🕐')) return 'log-running';
    if (message.includes('📰') || message.includes('---')) return 'log-running';
    if (message.includes('⏭️')) return 'log-warning';
    return 'log-info';
}

function updateLogs(logs) {
    const container = document.getElementById('crawlLogs');
    
    if (!logs || logs.length === 0) {
        if (container.querySelector('.log-placeholder')) return;
        container.innerHTML = '<div class="log-placeholder">点击"开始抓取"按钮启动抓取任务</div>';
        return;
    }
    
    container.innerHTML = logs.map(log => {
        const logClass = getLogClass(log.message);
        return `<div class="log-item"><span class="log-time">[${log.time}]</span><span class="${logClass}">${log.message}</span></div>`;
    }).join('');
    
    container.scrollTop = container.scrollHeight;
}

function updateStatus(data) {
    isCrawling = data.is_running;

    const statusEl = document.getElementById('crawlStatus');
    const stepEl = document.getElementById('currentStep');
    const btnEl = document.getElementById('startCrawlBtn');

    if (isCrawling) {
        statusEl.textContent = '抓取中...';
        statusEl.className = 'status-value status-running';
        btnEl.disabled = true;
        btnEl.textContent = '抓取中...';
    } else {
        statusEl.textContent = '空闲';
        statusEl.className = 'status-value status-idle';
        btnEl.disabled = false;
        btnEl.textContent = '开始抓取';
    }

    stepEl.textContent = data.current_step || '-';

    if (data.last_run) {
        document.getElementById('lastCrawlTime').textContent = formatTime(data.last_run);
    }

    updateSourcesList(data.latest_log);
}

function updateSourcesList(latestLog) {
    const container = document.getElementById('sourcesList');
    const allSources = ['财联社', '东方财富'];
    
    container.innerHTML = allSources.map(source => {
        let status = 'pending';
        let count = '-';
        
        if (latestLog && latestLog.source === source) {
            status = latestLog.status || 'pending';
            count = latestLog.news_count || 0;
        }
        
        return `
            <div class="source-item">
                <div class="source-name">${source}</div>
                <div class="source-status ${status}">${getStatusText(status)}</div>
                <div class="source-count">${count}条</div>
            </div>
        `;
    }).join('');
}

function getStatusText(status) {
    const statusMap = {
        'pending': '等待中',
        'running': '进行中',
        'success': '成功',
        'failed': '失败'
    };
    return statusMap[status] || '等待中';
}

async function startCrawl() {
    if (isCrawling) return;

    try {
        const response = await fetchWithAuth('/api/crawl/trigger', {
            method: 'POST'
        });
        const data = await response.json();

        if (data.status === 'started' || data.status === 'already_running') {
            pollStatus();
        } else {
            alert('启动抓取失败: ' + (data.message || '未知错误'));
        }
    } catch (error) {
        alert('启动抓取失败: ' + error.message);
    }
}

let pollInterval;

function pollStatus() {
    if (pollInterval) clearInterval(pollInterval);
    
    pollInterval = setInterval(async () => {
        await loadStatus();
        
        if (!isCrawling) {
            clearInterval(pollInterval);
        }
    }, 500);
}

function formatTime(timeStr) {
    const date = new Date(timeStr);
    return date.toLocaleString('zh-CN');
}

document.getElementById('startCrawlBtn').addEventListener('click', startCrawl);

loadStatus();
</script>
{% endblock %}
