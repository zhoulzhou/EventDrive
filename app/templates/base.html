<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}新闻抓取应用{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="/">新闻抓取</a>
            </div>
            <div class="navbar-menu">
                <a href="/" class="nav-link">首页</a>
                <a href="/crawl" class="nav-link">抓取控制</a>
                <a href="/filter" class="nav-link">筛选规则</a>
                <a href="/logs" class="nav-link">抓取日志</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 新闻抓取应用. All rights reserved.</p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
